services:
  - type: web
    name: one-piece-spoiler-bot
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright # This forces it to stay in your project
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: MONGO_URI
        sync: false
