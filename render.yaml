services:
  - type: web
    name: one-piece-spoiler-bot
    runtime: python
    # This build command forces the binary install of greenlet first
    buildCommand: pip install --only-binary :all: greenlet && pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: MONGO_URI
        sync: false
      - key: TWITTER_AUTH_TOKEN
        sync: false
      - key: TWITTER_CT0
        sync: false
